<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battery Monitor</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0d0d0f;
    --surface: #141417;
    --surface2: #1a1a1f;
    --border: #2a2a32;
    --gold: #c9933a;
    --gold-light: #e8b96a;
    --gold-dim: #7a5520;
    --text: #e8e4dc;
    --text-dim: #7a7870;
    --text-muted: #3f3d38;
    --green: #4caf78;
    --yellow: #d4a547;
    --orange: #d47a30;
    --red: #c94040;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    padding: 0;
  }

  /* ── HEADER ── */
  header {
    padding: 28px 32px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: rgba(13,13,15,0.92);
    backdrop-filter: blur(16px);
    z-index: 100;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo-icon {
    width: 36px; height: 36px;
    border: 1.5px solid var(--gold);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  .logo-text span {
    color: var(--gold);
  }

  .header-meta {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    text-align: right;
    line-height: 1.6;
  }

  /* ── MAIN ── */
  main {
    padding: 32px;
    max-width: 960px;
    margin: 0 auto;
  }

  /* ── SUMMARY BAR ── */
  .summary {
    display: flex;
    gap: 16px;
    margin-bottom: 36px;
    flex-wrap: wrap;
  }

  .summary-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 24px;
    flex: 1;
    min-width: 140px;
  }

  .summary-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .summary-value {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--gold-light);
    line-height: 1;
  }

  .summary-value .unit {
    font-size: 13px;
    color: var(--text-dim);
    margin-left: 3px;
  }

  /* ── SECTION TITLE ── */
  .section-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    margin-top: 8px;
  }

  .section-header h2 {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .section-header::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ── DEVICE GRID ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 40px;
  }

  .device-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 20px 18px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
  }

  .device-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 2px 2px 0 0;
    transition: opacity 0.3s;
  }

  .device-card:hover {
    border-color: var(--gold-dim);
    background: var(--surface2);
  }

  .device-card.level-high::before  { background: var(--green); opacity: 0.9; }
  .device-card.level-mid::before   { background: var(--yellow); opacity: 0.9; }
  .device-card.level-low::before   { background: var(--orange); opacity: 0.9; }
  .device-card.level-crit::before  { background: var(--red); opacity: 0.9; }

  .device-icon {
    font-size: 32px;
    margin-bottom: 14px;
    display: block;
    line-height: 1;
  }

  .device-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .device-model {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 16px;
    font-weight: 400;
  }

  /* ── BATTERY BAR ── */
  .battery-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .battery-bar-track {
    flex: 1;
    height: 7px;
    background: var(--border);
    border-radius: 4px;
    overflow: hidden;
  }

  .battery-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .level-high  .battery-bar-fill { background: var(--green); }
  .level-mid   .battery-bar-fill { background: var(--yellow); }
  .level-low   .battery-bar-fill { background: var(--orange); }
  .level-crit  .battery-bar-fill { background: var(--red); }

  .battery-pct {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    min-width: 38px;
    text-align: right;
  }

  .level-high  .battery-pct { color: var(--green); }
  .level-mid   .battery-pct { color: var(--yellow); }
  .level-low   .battery-pct { color: var(--orange); }
  .level-crit  .battery-pct { color: var(--red); }

  /* ── INLINE EDIT ── */
  .edit-row {
    margin-top: 14px;
    display: none;
    gap: 8px;
    align-items: center;
  }

  .device-card.editing .edit-row { display: flex; }

  .edit-row input[type=range] {
    flex: 1;
    appearance: none;
    height: 4px;
    background: var(--border);
    border-radius: 4px;
    outline: none;
    cursor: pointer;
  }

  .edit-row input[type=range]::-webkit-slider-thumb {
    appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--gold);
    border: 2px solid var(--bg);
    cursor: pointer;
  }

  .edit-done {
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 11px;
    font-weight: 700;
    font-family: 'Space Grotesk', sans-serif;
    cursor: pointer;
    letter-spacing: 0.04em;
    transition: background 0.15s;
  }
  .edit-done:hover { background: var(--gold-light); }

  /* ── CHARGING BADGE ── */
  .charging-badge {
    display: inline-block;
    font-size: 10px;
    background: rgba(201,147,58,0.12);
    color: var(--gold);
    border: 1px solid rgba(201,147,58,0.3);
    border-radius: 4px;
    padding: 1px 6px;
    margin-left: 6px;
    font-weight: 600;
    letter-spacing: 0.05em;
    vertical-align: middle;
  }

  /* ── ADD DEVICE ── */
  .add-device-btn {
    background: transparent;
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    padding: 22px 20px 18px;
    cursor: pointer;
    color: var(--text-dim);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
    transition: border-color 0.2s, color 0.2s;
    text-align: left;
    width: 100%;
  }
  .add-device-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

  /* ── MODAL ── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 32px;
    width: 360px;
    max-width: 90vw;
    transform: translateY(12px);
    transition: transform 0.25s;
  }
  .modal-backdrop.open .modal { transform: translateY(0); }

  .modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 24px; }
  .modal h3 span { color: var(--gold); }

  .field { margin-bottom: 18px; }
  .field label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); display: block; margin-bottom: 7px; }
  .field input, .field select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus { border-color: var(--gold-dim); }
  .field select option { background: var(--surface2); }

  .modal-actions { display: flex; gap: 10px; margin-top: 28px; }

  .btn-primary {
    flex: 1;
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: var(--radius-sm);
    padding: 11px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--gold-light); }

  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 18px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .btn-ghost:hover { border-color: var(--text-muted); color: var(--text); }

  /* ── TIMESTAMP ── */
  #last-updated {
    font-family: 'Space Mono', monospace;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    main { padding: 20px 16px; }
    header { padding: 20px 16px; }
    .summary-card { padding: 14px 18px; }
    .summary-value { font-size: 22px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">BATTERY<span>MONITOR</span></div>
  </div>
  <div class="header-meta">
    <div id="last-updated">—</div>
    <div>Toca un dispositivo para editar</div>
  </div>
</header>

<main>
  <div class="summary" id="summary">
    <div class="summary-card">
      <div class="summary-label">Promedio general</div>
      <div class="summary-value" id="avg-val">—<span class="unit">%</span></div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Dispositivos críticos</div>
      <div class="summary-value" id="crit-val" style="color: var(--red)">—</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Dispositivos totales</div>
      <div class="summary-value" id="total-val">—</div>
    </div>
  </div>

  <div class="section-header"><h2>Mis dispositivos</h2></div>
  <div class="grid" id="device-grid"></div>
</main>

<!-- ADD DEVICE MODAL -->
<div class="modal-backdrop" id="modal-backdrop">
  <div class="modal">
    <h3>Agregar <span>dispositivo</span></h3>
    <div class="field">
      <label>Nombre</label>
      <input type="text" id="new-name" placeholder="Ej. iPhone de José" />
    </div>
    <div class="field">
      <label>Tipo</label>
      <select id="new-type">
        <option value="iphone">iPhone</option>
        <option value="ipad">iPad</option>
        <option value="mac">Mac</option>
        <option value="airpods">AirPods</option>
        <option value="watch">Apple Watch</option>
        <option value="keyboard">Magic Keyboard</option>
        <option value="mouse">Magic Mouse / Trackpad</option>
        <option value="pencil">Apple Pencil</option>
        <option value="other">Otro</option>
      </select>
    </div>
    <div class="field">
      <label>Modelo (opcional)</label>
      <input type="text" id="new-model" placeholder="Ej. iPhone 15 Pro" />
    </div>
    <div class="field">
      <label>Nivel de batería: <strong id="new-level-display">75%</strong></label>
      <input type="range" id="new-level" min="0" max="100" value="75" oninput="document.getElementById('new-level-display').textContent=this.value+'%'" />
    </div>
    <div class="modal-actions">
      <button class="btn-ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" onclick="addDevice()">Agregar</button>
    </div>
  </div>
</div>

<script>
const ICONS = {
  iphone: '📱',
  ipad: '⬛',
  mac: '💻',
  airpods: '🎧',
  watch: '⌚',
  keyboard: '⌨️',
  mouse: '🖱️',
  pencil: '✏️',
  other: '🔋',
};

const DEFAULT_DEVICES = [
  { id: 1, name: 'iPhone',         type: 'iphone',   model: 'iPhone 15 Pro', level: 82, charging: false },
  { id: 2, name: 'iPad',           type: 'ipad',     model: 'iPad Pro M2',   level: 61, charging: false },
  { id: 3, name: 'MacBook',        type: 'mac',      model: 'MacBook Pro M3',level: 45, charging: true  },
  { id: 4, name: 'AirPods Pro',    type: 'airpods',  model: 'AirPods Pro 2', level: 33, charging: false },
  { id: 5, name: 'Magic Keyboard', type: 'keyboard', model: 'con Touch ID',  level: 91, charging: false },
  { id: 6, name: 'Apple Watch',    type: 'watch',    model: 'Series 9',      level: 18, charging: false },
];

let devices = JSON.parse(localStorage.getItem('bm_devices') || 'null') || DEFAULT_DEVICES;
let nextId = Math.max(...devices.map(d => d.id), 0) + 1;

function save() {
  localStorage.setItem('bm_devices', JSON.stringify(devices));
}

function levelClass(n) {
  if (n > 50) return 'level-high';
  if (n > 25) return 'level-mid';
  if (n > 10) return 'level-low';
  return 'level-crit';
}

function updateSummary() {
  const avg = Math.round(devices.reduce((a,d) => a + d.level, 0) / devices.length);
  const crit = devices.filter(d => d.level <= 10).length;
  document.getElementById('avg-val').innerHTML = avg + '<span class="unit">%</span>';
  document.getElementById('crit-val').textContent = crit;
  document.getElementById('total-val').textContent = devices.length;
  const now = new Date();
  document.getElementById('last-updated').textContent = now.toLocaleTimeString('es-CO', {hour:'2-digit',minute:'2-digit'});
}

function render() {
  const grid = document.getElementById('device-grid');
  grid.innerHTML = '';
  devices.forEach(d => {
    const cls = levelClass(d.level);
    const card = document.createElement('div');
    card.className = `device-card ${cls}`;
    card.dataset.id = d.id;
    card.innerHTML = `
      <span class="device-icon">${ICONS[d.type] || ICONS.other}</span>
      <div class="device-name">${d.name}${d.charging ? '<span class="charging-badge">⚡ Cargando</span>' : ''}</div>
      <div class="device-model">${d.model || ''}</div>
      <div class="battery-wrap">
        <div class="battery-bar-track">
          <div class="battery-bar-fill" style="width:${d.level}%"></div>
        </div>
        <span class="battery-pct">${d.level}%</span>
      </div>
      <div class="edit-row">
        <input type="range" min="0" max="100" value="${d.level}" data-id="${d.id}" oninput="liveUpdate(${d.id},this.value)" />
        <button class="edit-done" onclick="doneEdit(event,${d.id})">OK</button>
      </div>
    `;
    card.addEventListener('click', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON') return;
      const isEditing = card.classList.contains('editing');
      document.querySelectorAll('.device-card.editing').forEach(c => c.classList.remove('editing'));
      if (!isEditing) card.classList.add('editing');
    });
    // long press → delete
    let pressTimer;
    card.addEventListener('mousedown', () => { pressTimer = setTimeout(() => confirmDelete(d.id), 800); });
    card.addEventListener('mouseup', () => clearTimeout(pressTimer));
    card.addEventListener('mouseleave', () => clearTimeout(pressTimer));
    card.addEventListener('touchstart', () => { pressTimer = setTimeout(() => confirmDelete(d.id), 800); }, {passive:true});
    card.addEventListener('touchend', () => clearTimeout(pressTimer));

    grid.appendChild(card);
  });

  // Add button
  const addBtn = document.createElement('button');
  addBtn.className = 'add-device-btn';
  addBtn.innerHTML = '<span style="font-size:22px">＋</span><span>Agregar dispositivo</span>';
  addBtn.onclick = openModal;
  grid.appendChild(addBtn);

  updateSummary();
}

function liveUpdate(id, val) {
  const d = devices.find(x => x.id === id);
  if (!d) return;
  d.level = parseInt(val);
  const card = document.querySelector(`[data-id="${id}"]`);
  if (card) {
    card.querySelector('.battery-pct').textContent = val + '%';
    card.querySelector('.battery-bar-fill').style.width = val + '%';
    card.className = `device-card editing ${levelClass(d.level)}`;
  }
  updateSummary();
}

function doneEdit(e, id) {
  e.stopPropagation();
  save();
  document.querySelectorAll('.device-card.editing').forEach(c => c.classList.remove('editing'));
}

function confirmDelete(id) {
  const d = devices.find(x => x.id === id);
  if (!d) return;
  if (confirm(`¿Eliminar "${d.name}"?`)) {
    devices = devices.filter(x => x.id !== id);
    save();
    render();
  }
}

// ── MODAL ──
function openModal() { document.getElementById('modal-backdrop').classList.add('open'); }
function closeModal() { document.getElementById('modal-backdrop').classList.remove('open'); }

document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
});

function addDevice() {
  const name  = document.getElementById('new-name').value.trim();
  const type  = document.getElementById('new-type').value;
  const model = document.getElementById('new-model').value.trim();
  const level = parseInt(document.getElementById('new-level').value);
  if (!name) { document.getElementById('new-name').focus(); return; }
  devices.push({ id: nextId++, name, type, model, level, charging: false });
  save();
  render();
  closeModal();
  // reset
  document.getElementById('new-name').value = '';
  document.getElementById('new-model').value = '';
  document.getElementById('new-level').value = 75;
  document.getElementById('new-level-display').textContent = '75%';
}

render();
</script>
</body>
</html>
