<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Battery Monitor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600;700&display=swap');

:root {
  --bg:        #080809;
  --s1:        #111114;
  --s2:        #17171b;
  --s3:        #1e1e23;
  --border:    #27272e;
  --border2:   #333340;
  --gold:      #c8903a;
  --gold-l:    #e5b56a;
  --gold-xl:   #f0cc96;
  --gold-dim:  rgba(200,144,58,.15);
  --text:      #ece8e1;
  --text-2:    #8a877f;
  --text-3:    #45443f;
  --green:     #4db875;
  --yellow:    #d4a940;
  --orange:    #d4722a;
  --red:       #cc3f3f;
  --r:         12px;
  --r-sm:      7px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ── HEADER ── */
.header {
  position: sticky; top: 0; z-index: 50;
  background: rgba(8,8,9,.88);
  backdrop-filter: blur(20px) saturate(140%);
  border-bottom: 1px solid var(--border);
  padding: 0 28px;
  height: 56px;
  display: flex; align-items: center; justify-content: space-between;
}

.header-left { display: flex; align-items: center; gap: 14px; }

.wordmark {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; font-weight: 700;
  letter-spacing: .08em;
  color: var(--text);
}
.wordmark em { color: var(--gold); font-style: normal; }

.pulse-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 0 0 rgba(77,184,117,.5);
  animation: pulse 2.4s ease-in-out infinite;
}
.pulse-dot.stale { background: var(--text-3); box-shadow: none; animation: none; }

@keyframes pulse {
  0%  { box-shadow: 0 0 0 0 rgba(77,184,117,.5); }
  70% { box-shadow: 0 0 0 6px rgba(77,184,117,0); }
  100%{ box-shadow: 0 0 0 0 rgba(77,184,117,0); }
}

.header-right {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text-2);
  text-align: right; line-height: 1.8;
}

/* ── LAYOUT ── */
.main { max-width: 1000px; margin: 0 auto; padding: 32px 28px 64px; }

/* ── KPI ROW ── */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 36px;
}

.kpi {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 18px 20px 16px;
}
.kpi-label {
  font-size: 10px; font-weight: 600; letter-spacing: .09em;
  text-transform: uppercase; color: var(--text-2);
  margin-bottom: 10px;
}
.kpi-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 30px; font-weight: 700; line-height: 1;
  color: var(--gold-l);
}
.kpi-num .unit { font-size: 14px; color: var(--text-2); margin-left: 2px; }
.kpi-num.red   { color: var(--red); }
.kpi-num.green { color: var(--green); }

/* ── SECTION ── */
.section-label {
  font-size: 10px; font-weight: 600; letter-spacing: .1em;
  text-transform: uppercase; color: var(--text-3);
  margin-bottom: 14px; margin-top: 32px;
  display: flex; align-items: center; gap: 12px;
}
.section-label::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

/* ── GRID ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 12px;
}

/* ── CARD ── */
.card {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 20px 18px 16px;
  position: relative;
  overflow: hidden;
  cursor: default;
  transition: border-color .2s, background .2s;
}
.card:hover { border-color: var(--border2); background: var(--s2); }

/* accent top bar */
.card::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 2px;
  border-radius: 2px 2px 0 0;
}
.card.hi::after  { background: var(--green); }
.card.mid::after { background: var(--yellow); }
.card.lo::after  { background: var(--orange); }
.card.cr::after  { background: var(--red); animation: blink 1.4s ease-in-out infinite; }

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* stale overlay */
.card.stale { opacity: .55; }

.card-icon { font-size: 28px; line-height: 1; margin-bottom: 12px; display: block; }

.card-name {
  font-size: 13px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.card-model {
  font-size: 11px; color: var(--text-2); margin-top: 2px; margin-bottom: 14px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

/* battery row */
.batt-row { display: flex; align-items: center; gap: 9px; }
.batt-track {
  flex: 1; height: 6px; background: var(--border);
  border-radius: 3px; overflow: hidden;
}
.batt-fill {
  height: 100%; border-radius: 3px;
  transition: width .7s cubic-bezier(.4,0,.2,1);
}
.card.hi  .batt-fill { background: var(--green); }
.card.mid .batt-fill { background: var(--yellow); }
.card.lo  .batt-fill { background: var(--orange); }
.card.cr  .batt-fill { background: var(--red); }

.batt-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px; font-weight: 700; min-width: 36px; text-align: right;
}
.card.hi  .batt-pct { color: var(--green); }
.card.mid .batt-pct { color: var(--yellow); }
.card.lo  .batt-pct { color: var(--orange); }
.card.cr  .batt-pct { color: var(--red); }

/* tags */
.tag-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
.tag {
  font-size: 9px; font-weight: 600; letter-spacing: .06em;
  text-transform: uppercase; padding: 2px 6px; border-radius: 3px;
}
.tag.charging { background: rgba(200,144,58,.14); color: var(--gold); border: 1px solid rgba(200,144,58,.25); }
.tag.stale    { background: rgba(138,135,127,.1);  color: var(--text-2); border: 1px solid var(--border); }
.tag.fresh    { display:none; }

/* time ago */
.card-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; color: var(--text-3);
  margin-top: 8px;
}

/* ── EMPTY / ERROR STATE ── */
.state-box {
  grid-column: 1/-1;
  padding: 48px 24px;
  text-align: center;
  color: var(--text-2);
  font-size: 13px; line-height: 1.8;
}
.state-box strong { display: block; font-size: 15px; color: var(--text); margin-bottom: 8px; }
.state-box code {
  background: var(--s2); border: 1px solid var(--border);
  border-radius: 4px; padding: 2px 7px;
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--gold-l);
}

/* ── SETUP BANNER ── */
.setup-banner {
  background: var(--gold-dim);
  border: 1px solid rgba(200,144,58,.25);
  border-radius: var(--r);
  padding: 18px 22px;
  margin-bottom: 28px;
  display: none;
}
.setup-banner.visible { display: flex; align-items: flex-start; gap: 14px; }
.setup-banner-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
.setup-banner-body { font-size: 12px; color: var(--text-2); line-height: 1.7; }
.setup-banner-body strong { color: var(--gold-xl); display: block; font-size: 13px; margin-bottom: 4px; }
.setup-banner-body code {
  background: rgba(0,0,0,.3); border-radius: 4px;
  padding: 1px 6px; font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--gold-l);
  user-select: all; cursor: copy;
}

/* ── REFRESH BTN ── */
.refresh-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  color: var(--text-2); font-family: 'Inter', sans-serif;
  font-size: 11px; padding: 5px 12px;
  cursor: pointer; transition: border-color .15s, color .15s;
}
.refresh-btn:hover { border-color: var(--gold-dim); color: var(--gold-l); }
.refresh-btn.spinning { animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .kpi-row { grid-template-columns: repeat(2,1fr); }
  .main { padding: 20px 16px 48px; }
  .header { padding: 0 16px; }
}
</style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <div class="pulse-dot" id="dot"></div>
    <div class="wordmark">BATTERY<em>MONITOR</em></div>
  </div>
  <div class="header-right">
    <div id="hdr-time">—</div>
    <div>↻ cada 60 s</div>
  </div>
</header>

<main class="main">

  <!-- Setup banner (shown if env vars missing) -->
  <div class="setup-banner" id="setup-banner">
    <div class="setup-banner-icon">⚙️</div>
    <div class="setup-banner-body">
      <strong>Configuración pendiente</strong>
      Agrega tus variables de entorno en Netlify: <code>SUPABASE_URL</code> y <code>SUPABASE_ANON_KEY</code>.
      Luego instala los Atajos en tus dispositivos — las instrucciones están en <code>README.md</code> del repo.
    </div>
  </div>

  <!-- KPI row -->
  <div class="kpi-row">
    <div class="kpi">
      <div class="kpi-label">Promedio</div>
      <div class="kpi-num" id="kpi-avg">—<span class="unit">%</span></div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Críticos</div>
      <div class="kpi-num red" id="kpi-crit">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Cargando</div>
      <div class="kpi-num green" id="kpi-charging">—</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Dispositivos</div>
      <div class="kpi-num" id="kpi-total">—</div>
    </div>
  </div>

  <div class="section-label">
    Dispositivos
    <button class="refresh-btn" id="refresh-btn" onclick="loadDevices()">↻ Actualizar</button>
  </div>
  <div class="grid" id="grid"></div>

</main>

<script>
// ── CONFIG — injected at build time by Netlify env vars via a meta tag or
//    fetched from /.netlify/functions/config (keeps keys out of client bundle)
// ──────────────────────────────────────────────────────────────────────────

const ICONS = {
  iphone:'📱', ipad:'⬛', mac:'💻', airpods:'🎧',
  watch:'⌚', keyboard:'⌨️', mouse:'🖱️', pencil:'✏️', other:'🔋'
};

let devices = [];

// ── FETCH via Netlify serverless proxy (hides Supabase URL/key from client)
async function loadDevices() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  try {
    const r = await fetch('/.netlify/functions/devices');
    if (!r.ok) throw new Error(r.status);
    devices = await r.json();
    render(devices);
    document.getElementById('dot').classList.remove('stale');
    const now = new Date();
    document.getElementById('hdr-time').textContent =
      now.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  } catch(e) {
    console.error(e);
    document.getElementById('dot').classList.add('stale');
    document.getElementById('setup-banner').classList.add('visible');
    renderError();
  } finally {
    btn.classList.remove('spinning');
  }
}

function levelClass(n) {
  if (n > 50) return 'hi';
  if (n > 25) return 'mid';
  if (n > 10) return 'lo';
  return 'cr';
}

function timeAgo(iso) {
  if (!iso) return '';
  const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (diff < 60) return 'hace ' + diff + 's';
  if (diff < 3600) return 'hace ' + Math.floor(diff/60) + 'min';
  if (diff < 86400) return 'hace ' + Math.floor(diff/3600) + 'h';
  return 'hace ' + Math.floor(diff/86400) + 'd';
}

function isStale(iso) {
  if (!iso) return true;
  return (Date.now() - new Date(iso)) > 4 * 3600 * 1000; // >4h = stale
}

function render(data) {
  const grid = document.getElementById('grid');
  if (!data.length) { renderEmpty(); return; }

  const avg    = Math.round(data.reduce((a,d)=>a+d.level,0)/data.length);
  const crit   = data.filter(d=>d.level<=10).length;
  const charging = data.filter(d=>d.charging).length;
  document.getElementById('kpi-avg').innerHTML    = avg + '<span class="unit">%</span>';
  document.getElementById('kpi-crit').textContent  = crit;
  document.getElementById('kpi-charging').textContent = charging;
  document.getElementById('kpi-total').textContent = data.length;

  // sort: critical first, then by level asc
  const sorted = [...data].sort((a,b) => a.level - b.level);

  grid.innerHTML = sorted.map(d => {
    const cls   = levelClass(d.level);
    const stale = isStale(d.updated_at);
    const ago   = timeAgo(d.updated_at);
    return `
    <div class="card ${cls}${stale?' stale':''}">
      <span class="card-icon">${ICONS[d.device_type]||ICONS.other}</span>
      <div class="card-name">${esc(d.name)}</div>
      <div class="card-model">${esc(d.model||'')}</div>
      <div class="batt-row">
        <div class="batt-track"><div class="batt-fill" style="width:${d.level}%"></div></div>
        <span class="batt-pct">${d.level}%</span>
      </div>
      <div class="tag-row">
        ${d.charging ? '<span class="tag charging">⚡ Cargando</span>' : ''}
        ${stale ? '<span class="tag stale">Sin actualizar</span>' : ''}
      </div>
      <div class="card-time">${ago}</div>
    </div>`;
  }).join('');
}

function renderEmpty() {
  document.getElementById('grid').innerHTML = `
    <div class="state-box">
      <strong>Sin dispositivos todavía</strong>
      Instala el Atajo en tu iPhone, iPad o Mac y envía el primer dato.
      La tabla se llenará automáticamente.
    </div>`;
}

function renderError() {
  document.getElementById('grid').innerHTML = `
    <div class="state-box">
      <strong>No se pudo conectar a Supabase</strong>
      Verifica que <code>SUPABASE_URL</code> y <code>SUPABASE_ANON_KEY</code>
      estén configuradas en Netlify → Site configuration → Environment variables.
    </div>`;
}

function esc(s) {
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── POLL every 60 s
loadDevices();
setInterval(loadDevices, 60_000);
</script>
</body>
</html>
